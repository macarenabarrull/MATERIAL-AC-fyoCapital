<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinámica 1: Dime quién eres...</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-indigo: #4f46e5;
            --brand-emerald: #10b981;
            --brand-slate: #0f172a;
            --slate-400: #94a3b8;
            --slate-100: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: transparent;
            color: var(--brand-slate);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Premium Background Orbs */
        .background-orbs {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: -1;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: floatOrb 15s infinite alternate ease-in-out;
        }
        .orb-1 {
            width: 500px;
            height: 500px;
            background: var(--brand-indigo);
            top: -100px;
            left: -100px;
        }
        .orb-2 {
            width: 400px;
            height: 400px;
            background: var(--brand-emerald);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        .container {
            width: 95%;
            height: 80%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .word-cloud {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .word {
            position: absolute;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: var(--slate-400);
            white-space: nowrap;
            cursor: default;
            /* Bouncy and smooth transitions for all properties */
            transition: left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        top 0.8s cubic-bezier(0.34, 1.56, 0.64, 1),
                        font-size 0.8s ease,
                        opacity 0.8s ease,
                        background-color 0.8s ease,
                        color 0.8s ease,
                        box-shadow 0.8s ease,
                        transform 0.8s ease;
            user-select: none;
            padding: 0.5rem 1.5rem;
            border-radius: 999px;
            transform: translate(-50%, -50%);
        }

        /* Premium Selected State */
        .word.selected {
            color: var(--brand-indigo);
            background: white;
            border: 2px solid rgba(79, 70, 229, 0.1);
            font-size: 2.2rem !important;
            font-weight: 900;
            padding: 1rem 3rem;
            box-shadow: 0 20px 40px rgba(79, 70, 229, 0.15), 0 0 0 4px rgba(255, 255, 255, 0.5);
            z-index: 100;
            opacity: 1 !important;
            letter-spacing: -0.02em;
        }

        .word.dimmed {
            opacity: 0.05 !important;
            filter: blur(4px);
            transform: translate(-50%, -50%) scale(0.5) !important;
        }

        .controls {
            margin-top: 2rem;
            z-index: 10;
        }

        button {
            background: var(--brand-slate);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-family: 'Outfit', sans-serif;
            font-size: 0.875rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        button:hover:not(:disabled) {
            background: var(--brand-indigo);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.3);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background: var(--slate-400);
            box-shadow: none;
        }

        .btn-icon {
            font-size: 1.2rem;
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translate(-50%, -50%); }
            25% { transform: translate(calc(-50% + 10px), calc(-50% - 10px)); }
            50% { transform: translate(calc(-50% - 5px), calc(-50% + 15px)); }
            75% { transform: translate(calc(-50% - 15px), calc(-50% - 5px)); }
            100% { transform: translate(-50%, -50%); }
        }
    </style>
</head>
<body>

    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="container" id="container">
        <div class="word-cloud" id="wordCloud"></div>
    </div>

    <div class="controls">
        <button id="raffleBtn">
            <span class="btn-text">Sortear palabras</span>
            <span class="btn-icon">✨</span>
        </button>
    </div>

    <script>
        const words = [
            "Cliente", "Negocio", "Soja", "Cosecha", "Siembra", "Maíz", "Trigo", "Campo", "Argentina", "Rosario", "Región", "Campo argentino", "Economía", "Inflación", "Dólar", "Trabajo", "Esfuerzo", "Crecimiento", "Crisis", "Futuro", "Historia", "Presente", "Camino", "Decisión", "Riesgo", "Mate", "Café", "Mesa", "Charla", "Amigo", "Familia", "Viaje", "Casa", "Tiempo", "Energía", "Constancia", "Paciencia", "Presión", "Frustración", "Etapa", "Desafío", "Aprendizaje", "Mejora", "Diferencia", "Impulso", "Construcción", "Progreso", "Equipo", "Messi", "Maradona", "Partido", "Mundial", "Rugby", "Fútbol", "Pádel", "Mercado", "Oportunidad", "Inversión", "Rentabilidad", "Planificación", "Innovación", "Estrategia", "Resultado", "Producción", "Rendimiento", "Clima", "Lluvia", "Sequía", "Tierra", "Cultivo", "Campaña", "Motivación", "Disciplina", "Resiliencia", "Enfoque"
        ];

        const wordCloud = document.getElementById('wordCloud');
        const raffleBtn = document.getElementById('raffleBtn');
        const btnText = raffleBtn.querySelector('.btn-text');
        const btnIcon = raffleBtn.querySelector('.btn-icon');
        
        let wordElements = [];
        let isRaffled = false;
        let isAnimating = false;

        // Initialize words with random depth (size/opacity)
        function init() {
            wordCloud.innerHTML = '';
            wordElements = [];
            
            words.forEach((word, index) => {
                const el = document.createElement('div');
                el.className = 'word';
                el.textContent = word;
                
                // Random position (keep away from extreme edges)
                const x = Math.random() * 80 + 10;
                const y = Math.random() * 80 + 10;
                
                // Random depth
                const size = 0.8 + Math.random() * 1.2; // 0.8rem to 2.0rem
                const opacity = 0.2 + Math.random() * 0.6; // 0.2 to 0.8
                
                el.style.left = `${x}%`;
                el.style.top = `${y}%`;
                el.style.fontSize = `${size}rem`;
                el.style.opacity = opacity;
                
                // Random animation delay and duration
                const duration = 10 + Math.random() * 15;
                const delay = Math.random() * -20;
                el.style.animation = `float ${duration}s ease-in-out ${delay}s infinite`;
                
                wordCloud.appendChild(el);
                wordElements.push({
                    el,
                    initialX: x,
                    initialY: y,
                    initialSize: size,
                    initialOpacity: opacity
                });
            });
        }

        function raffle() {
            if (isAnimating) return; // Anti-spam lock

            if (isRaffled) {
                // Reset Phase
                isAnimating = true;
                raffleBtn.disabled = true;
                btnText.textContent = 'Preparando...';
                btnIcon.textContent = '⏳';
                
                wordElements.forEach(item => {
                    item.el.className = 'word';
                    item.el.style.left = `${item.initialX}%`;
                    item.el.style.top = `${item.initialY}%`;
                    item.el.style.fontSize = `${item.initialSize}rem`;
                    item.el.style.opacity = item.initialOpacity;
                    item.el.style.animationPlayState = 'running';
                });
                
                isRaffled = false;
                
                // Wait for reset transition to finish before raffling again
                setTimeout(() => {
                    performRaffle();
                }, 800);
            } else {
                performRaffle();
            }
        }

        function performRaffle() {
            isAnimating = true;
            raffleBtn.disabled = true;
            btnText.textContent = 'Sorteando...';
            btnIcon.textContent = '🎲';

            // Select 5 random unique indices
            const selectedIndices = [];
            while (selectedIndices.length < 5) {
                const r = Math.floor(Math.random() * wordElements.length);
                if (!selectedIndices.includes(r)) {
                    selectedIndices.push(r);
                }
            }

            // Safe vertical column layout to prevent any overlap regardless of word length
            const positions = [
                { left: 50, top: 15 },
                { left: 50, top: 32.5 },
                { left: 50, top: 50 },
                { left: 50, top: 67.5 },
                { left: 50, top: 85 }
            ];

            // Dim non-selected words
            wordElements.forEach((item, index) => {
                item.el.style.animationPlayState = 'paused';
                if (!selectedIndices.includes(index)) {
                    item.el.className = 'word dimmed';
                }
            });

            // Staggered reveal for selected words
            selectedIndices.forEach((idx, i) => {
                setTimeout(() => {
                    const item = wordElements[idx];
                    item.el.className = 'word selected';
                    item.el.style.left = `${positions[i].left}%`;
                    item.el.style.top = `${positions[i].top}%`;
                }, i * 200); // 200ms delay between each word
            });

            // Unlock after all animations finish
            setTimeout(() => {
                isAnimating = false;
                raffleBtn.disabled = false;
                btnText.textContent = 'Reiniciar Sorteo';
                btnIcon.textContent = '🔄';
                isRaffled = true;
            }, (selectedIndices.length * 200) + 800);
        }

        raffleBtn.addEventListener('click', raffle);

        // Initialize on load
        init();
    </script>
</body>
</html>
