    <!-- Favicon (Emoji) -->

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --brand-indigo: #4f46e5;
        --brand-emerald: #10b981;
        --brand-slate: #0f172a;
        --accent-vibrant: #22d3ee; /* Vibrant Cyan */
        --accent-lime: #bef264;    /* Vibrant Lime */
        --premium-gold: #d4af37;
        --premium-silver: #c0c0c0;
      }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #fcfdfe;
        color: var(--brand-slate);
        overflow: hidden;
        /* Refined Fluid Typography */
        font-size: clamp(14px, 0.6vw + 10px, 16px);
        letter-spacing: -0.01em;
      }

      .font-display {
        font-family: 'Outfit', sans-serif;
        letter-spacing: -0.03em;
      }

      .font-space {
        font-family: 'Space Grotesk', sans-serif;
        letter-spacing: -0.02em;
      }
      
      /* Bento Grid Helper */
      .bento-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 1.5rem;
      }

      /* Border Gradient Glassmorphism */
      .glass-border {
        position: relative;
      }
      .glass-border::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(135deg, rgba(255,255,255,0.5), rgba(255,255,255,0.05), rgba(79,70,229,0.2));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }
      :focus-visible {
        outline: 2px solid var(--brand-indigo);
        outline-offset: 4px;
        border-radius: 4px;
      }

      /* Noise Texture Overlay - More subtle */
      .bg-noise {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        opacity: 0.012;
        pointer-events: none;
      }

      /* Mesh Gradient Backgrounds - More sophisticated */
      .bg-mesh-indigo {
        background: radial-gradient(at 0% 0%, hsla(225, 60%, 99%, 1) 0, transparent 50%),
                    radial-gradient(at 50% 0%, hsla(225, 40%, 98%, 1) 0, transparent 50%),
                    radial-gradient(at 100% 0%, hsla(225, 60%, 99%, 1) 0, transparent 50%),
                    radial-gradient(at 50% 100%, hsla(225, 30%, 97%, 1) 0, transparent 50%);
      }
      
      /* Aurora Animation Keyframes */
      @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
      }
      
      .animate-blob {
        animation: blob 15s infinite ease-in-out;
      }
      
      .animation-delay-2000 {
        animation-delay: 2s;
      }
      
      .animation-delay-4000 {
        animation-delay: 4s;
      }

      @keyframes shine {
        0% { left: -100%; }
        100% { left: 100%; }
      }
      
      .animate-shine {
        animation: shine 2s infinite;
      }

      @keyframes gradient-x {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      
      .animate-gradient-x {
        background-size: 200% 200%;
        animation: gradient-x 5s ease infinite;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #e2e8f0; 
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }

      @media print {
        @page {
          size: A4 portrait;
          margin: 0;
        }
        html, body {
            background-color: #ffffff !important;
            width: 210mm;
            height: auto;
            margin: 0 auto;
            padding: 0;
            overflow: visible !important;
        }
        body {
          color: #000000 !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
        .no-print {
            display: none !important;
        }
        main {
            padding: 0 !important;
            margin: 0 !important;
            width: 100% !important;
            display: block !important;
            overflow: visible !important;
        }
        #root {
          width: 100%;
          overflow: visible;
        }
        /* Hide browser headers/footers */
        header, footer {
          display: none !important;
        }
      }
    </style>
